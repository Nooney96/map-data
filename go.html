<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
</head>
<body style="font-family: sans-serif; text-align:center; padding-top:100px;">
    <h2>🚀 Jumping to Google Maps...</h2>
    <p>If the app doesn't open, <a id="manual" href="#">click here</a>.</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const lat = params.get('lat');
        const lng = params.get('lng');

        if(lat && lng) {
            // Using the official Search API link
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            document.getElementById('manual').href = mapsUrl;
            
            // This is the magic line that breaks out of the Wix "cage"
            window.location.replace(mapsUrl);
        } else {
            document.body.innerHTML = "<h3>Location Error. Please try again.</h3>";
        }
    </script>
</body>
</html>
